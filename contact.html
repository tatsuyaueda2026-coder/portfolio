<main>

<section class="contact-page">

    <h1>CONTACT</h1>

    <p class="contact-lead">
        撮影のご相談・ご依頼は<br>
        お気軽にお問い合わせください。
    </p>

    <p class="privacy-note">
        お問い合わせの前に
        <a href="privacy.html">プライバシーポリシー</a>
        をご確認ください。
    </p>

    <a href="https://www.instagram.com/ttyued?igsh=MXZnYmhuM2h6cTIxYw%3D%3D&utm_source=qr"
       target="_blank"
       class="contact-button">
        Instagram DM
    </a>

    <p class="contact-or">または</p>

    <form
        action="https://formsubmit.co/tatsuyaueda2026@gmail.com"
        method="POST"
        class="contact-form">

        <!-- FormSubmit設定 -->
        <input type="hidden" name="_subject" value="ホームページからお問い合わせが届きました">
        <input type="hidden" name="_next" value="https://tatsuyaueda2026-coder.github.io/portfolio/thanks.html">
        <input type="hidden" name="_captcha" value="true">

        <!-- スパム対策（表示されません） -->
        <input
            type="text"
            name="_honey"
            style="display:none">

        <div class="form-group">
            <label for="name">
                お名前
            </label>

            <input
                type="text"
                id="name"
                name="お名前"
                required>
        </div>

        <div class="form-group">
            <label for="email">
                メールアドレス
            </label>

            <input
                type="email"
                id="email"
                name="メールアドレス"
                required>
        </div>

        <div class="form-group">
            <label for="message">
                お問い合わせ内容
            </label>

            <textarea
                id="message"
                name="お問い合わせ内容"
                rows="8"
                required></textarea>
        </div>

        <button
            type="submit"
            class="contact-submit">
            送信する
        </button>

    </form>

</section>
